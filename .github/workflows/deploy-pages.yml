# .github/workflows/deploy-pages.yml

name: GitHub Pages 배포

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 📥 체크아웃
        uses: actions/checkout@v4

      # PAT 토큰을 index.html에 주입 (%%PAT_TOKEN%% 치환)
      - name: 🔑 토큰 주입
        run: |
          sed -i 's|%%PAT_TOKEN%%|${{ secrets.PAT_TOKEN }}|g' index.html

      - name: 📄 Pages 설정
        uses: actions/configure-pages@v4

      - name: 📦 업로드
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: 🚀 배포
        id: deployment
        uses: actions/deploy-pages@v4
