<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>머니올라 출연료 집행 의뢰서 생성기</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
      background: #f0f4f8;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 48px 40px;
      max-width: 480px;
      width: 100%;
      text-align: center;
    }

    .logo {
      font-size: 2.4rem;
      margin-bottom: 8px;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: #1a202c;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 0.9rem;
      color: #718096;
      margin-bottom: 32px;
    }

    .period-box {
      background: #ebf4ff;
      border-radius: 10px;
      padding: 14px 20px;
      margin-bottom: 28px;
      font-size: 0.95rem;
      color: #2b6cb0;
      font-weight: 600;
    }

    .btn-generate {
      background: linear-gradient(135deg, #3182ce, #2c5282);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 16px 40px;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      transition: opacity 0.2s, transform 0.1s;
    }

    .btn-generate:hover:not(:disabled) {
      opacity: 0.92;
      transform: translateY(-1px);
    }

    .btn-generate:disabled {
      background: #a0aec0;
      cursor: not-allowed;
    }

    .status-box {
      margin-top: 28px;
      padding: 18px 20px;
      border-radius: 10px;
      font-size: 0.95rem;
      display: none;
    }

    .status-box.running {
      background: #fffbeb;
      border: 1px solid #f6e05e;
      color: #744210;
      display: block;
    }

    .status-box.success {
      background: #f0fff4;
      border: 1px solid #68d391;
      color: #22543d;
      display: block;
    }

    .status-box.error {
      background: #fff5f5;
      border: 1px solid #fc8181;
      color: #742a2a;
      display: block;
    }

    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 3px solid #f6e05e;
      border-top-color: #744210;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .btn-download {
      display: inline-block;
      margin-top: 16px;
      background: #38a169;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 14px 32px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      width: 100%;
      transition: opacity 0.2s;
    }

    .btn-download:hover {
      opacity: 0.88;
    }

    .step-list {
      text-align: left;
      margin-top: 10px;
      font-size: 0.88rem;
      line-height: 2;
    }

    .elapsed-box {
      margin-top: 8px;
      font-size: 0.85rem;
      color: #92400e;
    }

    .footer {
      margin-top: 32px;
      font-size: 0.78rem;
      color: #a0aec0;
    }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">📄</div>
  <h1>출연료 집행 의뢰서 생성기</h1>
  <p class="subtitle">머니올라_KBS 유튜브 채널</p>

  <div class="period-box" id="periodBox">
    📅 조회 기간을 계산 중...
  </div>

  <button class="btn-generate" id="btnGenerate" onclick="startGenerate()">
    🎬 의뢰서 생성
  </button>

  <div class="status-box" id="statusBox">
    <div id="statusContent"></div>
  </div>

  <p class="footer">
    GitHub Actions로 자동 생성됩니다.<br/>
    생성 완료까지 약 1~2분 소요됩니다.
  </p>
</div>

<script>
  // ── 설정값
  const OWNER = "kunil-choi";
  const REPO  = "moneyola-cast-doc";
  const WORKFLOW_FILE = "generate-doc.yml";

  // ── 조회 기간 표시
  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth() + 1;
  const day = now.getDate();
  document.getElementById("periodBox").textContent =
    `📅 ${year}년 ${month}월 1일 ~ ${month}월 ${day}일`;

  // ── 상태 표시 함수
  function setStatus(type, html) {
    const box = document.getElementById("statusBox");
    box.className = "status-box " + type;
    document.getElementById("statusContent").innerHTML = html;
  }

  // ── 경과 시간 타이머
  let elapsedTimer = null;
  let elapsedSeconds = 0;

  function startElapsedTimer() {
    elapsedSeconds = 0;
    elapsedTimer = setInterval(() => {
      elapsedSeconds += 1;
      const el = document.getElementById("elapsed");
      if (el) el.textContent = elapsedSeconds;
    }, 1000);
  }

  function stopElapsedTimer() {
    if (elapsedTimer) {
      clearInterval(elapsedTimer);
      elapsedTimer = null;
    }
  }

  // ── 버튼 초기화
  function resetBtn() {
    const btn = document.getElementById("btnGenerate");
    btn.disabled = false;
    btn.textContent = "🎬 의뢰서 생성";
    stopElapsedTimer();
  }

  // ── 생성 시작
  async function startGenerate() {
    const btn = document.getElementById("btnGenerate");
    btn.disabled = true;
    btn.textContent = "⏳ 생성 중...";

    setStatus("running",
      `<span class="spinner"></span> 워크플로우를 시작하는 중입니다...`
    );

    try {
      // 1. workflow_dispatch 트리거
      const triggerRes = await fetch(
        `https://api.github.com/repos/${OWNER}/${REPO}/actions/workflows/${WORKFLOW_FILE}/dispatches`,
        {
          method: "POST",
          headers: {
            "Authorization": `Bearer ${window.__PAT__}`,
            "Accept": "application/vnd.github+json",
            "Content-Type": "application/json",
          },
          body: JSON.stringify({ ref: "main", inputs: { confirm: "yes" } }),
        }
      );

      if (!triggerRes.ok) {
        throw new Error(`워크플로우 시작 실패 (${triggerRes.status})`);
      }

      // 경과 시간 타이머 시작
      startElapsedTimer();

      setStatus("running",
        `<span class="spinner"></span> 실행 중입니다...<br/>
        <div class="step-list">
          ✅ 워크플로우 시작됨<br/>
          ⏳ YouTube 영상 수집 중...<br/>
          ⏳ 썸네일 + 첫프레임 + Claude 분석 중...<br/>
          ⏳ Word 문서 생성 중...
        </div>
        <div class="elapsed-box">
          ⏱ 경과 시간: <span id="elapsed">0</span>초 / 최대 4분
        </div>`
      );

      // 5초 대기 후 폴링 시작
      await new Promise(r => setTimeout(r, 5000));
      await pollForArtifact();

    } catch (err) {
      setStatus("error", `❌ 오류가 발생했습니다.<br/><small>${err.message}</small>`);
      resetBtn();
    }
  }

  // ── 완료 폴링
  async function pollForArtifact() {
    const maxTry = 48; // 최대 4분 대기 (5초 × 48)
    let tried = 0;

    const interval = setInterval(async () => {
      tried++;
      if (tried > maxTry) {
        clearInterval(interval);
        setStatus("error",
          "⏱ 시간이 초과되었습니다. Actions 탭에서 직접 확인해주세요."
        );
        resetBtn();
        return;
      }

      try {
        // 최신 실행 목록 조회
        const runsRes = await fetch(
          `https://api.github.com/repos/${OWNER}/${REPO}/actions/runs?per_page=5`,
          {
            headers: {
              "Authorization": `Bearer ${window.__PAT__}`,
              "Accept": "application/vnd.github+json",
            },
          }
        );
        const runsData = await runsRes.json();
        const latestRun = runsData.workflow_runs?.[0];

        if (!latestRun) return;

        if (latestRun.status === "completed" && latestRun.conclusion === "success") {
          clearInterval(interval);
          stopElapsedTimer();

          // Artifacts 조회
          const artRes = await fetch(
            `https://api.github.com/repos/${OWNER}/${REPO}/actions/runs/${latestRun.id}/artifacts`,
            {
              headers: {
                "Authorization": `Bearer ${window.__PAT__}`,
                "Accept": "application/vnd.github+json",
              },
            }
          );
          const artData = await artRes.json();
          const artifact = artData.artifacts?.[0];

          if (artifact) {
            const downloadUrl =
              `https://github.com/${OWNER}/${REPO}/actions/runs/${latestRun.id}/artifacts/${artifact.id}`;

            setStatus("success",
              `✅ 문서 생성이 완료되었습니다! (${elapsedSeconds}초 소요)<br/>
              <a class="btn-download" href="${downloadUrl}" target="_blank">
                📥 출연료 집행 의뢰서 다운로드
              </a>`
            );
          }
          resetBtn();

        } else if (latestRun.status === "completed" && latestRun.conclusion !== "success") {
          clearInterval(interval);
          stopElapsedTimer();
          setStatus("error",
            `❌ 워크플로우 실행 중 오류가 발생했습니다.<br/>
            <small>Actions 탭에서 로그를 확인해주세요.</small>`
          );
          resetBtn();
        }

      } catch (e) {
        // 폴링 중 일시적 오류는 무시하고 계속 시도
      }
    }, 5000);
  }
</script>

<!-- PAT 토큰 주입 -->
<script>
  window.__PAT__ = "%%PAT_TOKEN%%";
</script>

</body>
</html>
